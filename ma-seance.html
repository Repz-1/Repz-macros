<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPZ — Ma séance</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
    --orange:#FF6B35; --bg:#f3f4f6; --card:#ffffff; --dark:#1f2937;
    --line:#e5e7eb; --text:#1a1a1a; --text-dim:#6b7280; --green:#16a34a; --radius:20px;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; padding:16px 16px 90px; overflow-x:hidden; }
.top { display:flex; align-items:center; gap:14px; padding:8px 4px 18px; }
.back-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--line);
    background:var(--card); display:flex; align-items:center; justify-content:center;
    font-size:20px; color:var(--text); text-decoration:none; cursor:pointer; flex-shrink:0; }
.top h1 { font-size:21px; font-weight:800; letter-spacing:-.02em; }

.muscle-tabs { display:flex; gap:8px; overflow-x:auto; padding:4px 0 14px; -webkit-overflow-scrolling:touch; }
.muscle-tabs::-webkit-scrollbar { display:none; }
.muscle-tab { flex-shrink:0; padding:9px 16px; border-radius:30px; border:1.5px solid var(--line);
    background:var(--card); font-size:13.5px; font-weight:600; color:var(--text-dim); cursor:pointer; white-space:nowrap; }
.muscle-tab.active { background:var(--dark); color:#fff; border-color:var(--dark); }

.filter-tabs { display:flex; gap:8px; overflow-x:auto; padding:2px 0 14px; -webkit-overflow-scrolling:touch; }
.filter-tabs::-webkit-scrollbar { display:none; }
.filter-tab { flex-shrink:0; padding:7px 14px; border-radius:30px; border:1.5px solid var(--line);
    background:var(--card); font-size:12.5px; font-weight:600; color:var(--text-dim);
    cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:5px; }
.filter-tab.active { background:rgba(255,107,53,.12); color:var(--orange); border-color:var(--orange); }

.section-hint { font-size:13px; color:var(--text-dim); margin:6px 4px 14px; display:flex; align-items:center; gap:6px; }
.swipe-hint { font-size:11px; color:#9ca3af; }

.ex-list { display:flex; flex-direction:column; gap:10px; }
.ex-item { display:flex; align-items:center; gap:14px; background:var(--card);
    border:1.5px solid var(--line); border-radius:16px; padding:12px 14px; transition:border-color .15s; }
.ex-item.selected { border-color:var(--orange); background:#fff8f5; }
.ex-photo { width:56px; height:56px; flex-shrink:0; border-radius:12px;
    background:#e5e7eb center/cover no-repeat; display:flex; align-items:center; justify-content:center;
    font-size:10px; color:#9ca3af; text-align:center; line-height:1.2; font-weight:600; cursor:pointer; position:relative; }
.ex-photo::after { content:'🔍'; position:absolute; bottom:2px; right:2px; font-size:11px; opacity:.7;
    background:rgba(255,255,255,.7); border-radius:4px; padding:0 1px; }
.ex-info { flex:1; cursor:pointer; }
.ex-name { font-size:15px; font-weight:700; }
.ex-meta { font-size:12.5px; color:var(--text-dim); margin-top:2px; }
.ex-check { width:26px; height:26px; flex-shrink:0; border-radius:50%; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px; font-weight:700; cursor:pointer; }
.ex-item.selected .ex-check { background:var(--orange); border-color:var(--orange); }

.session-bar { position:fixed; bottom:16px; left:16px; right:16px; max-width:448px; margin:0 auto;
    background:var(--orange); color:#fff; border-radius:18px; padding:15px 20px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 8px 24px rgba(255,107,53,.35); cursor:pointer; z-index:50; }
.session-bar.hidden { display:none; }
.session-bar .count { font-size:14px; font-weight:700; }
.session-bar .go { font-size:14px; font-weight:800; }

.screen { display:none; }
.screen.active { display:block; }

.session-progress { background:var(--dark); color:#fff; border-radius:var(--radius); padding:20px; margin-bottom:18px; text-align:center; }
.session-progress .big { font-size:30px; font-weight:800; }
.session-progress .lbl { font-size:13px; color:#cbd5e1; margin-top:2px; }
.session-progress .bar { height:8px; background:#374151; border-radius:10px; margin-top:14px; overflow:hidden; }
.session-progress .fill { height:100%; background:var(--orange); border-radius:10px; transition:width .3s; width:0%; }

.done-item { display:flex; align-items:center; gap:14px; background:var(--card);
    border:1.5px solid var(--line); border-radius:16px; padding:12px 14px; margin-bottom:10px; cursor:pointer; transition:all .15s; }
.done-item.done { background:#f0fdf4; border-color:#bbf7d0; }
.done-item.done .done-name { text-decoration:line-through; color:var(--text-dim); }
.done-check { width:30px; height:30px; flex-shrink:0; border-radius:9px; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:17px; font-weight:700; }
.done-item.done .done-check { background:var(--green); border-color:var(--green); }
.done-info { flex:1; }
.done-name { font-size:15px; font-weight:700; }
.done-meta { font-size:12.5px; color:var(--text-dim); margin-top:2px; }
.done-photo { width:50px; height:50px; flex-shrink:0; border-radius:11px;
    background:linear-gradient(135deg,#e5e7eb,#f3f4f6); display:flex; align-items:center; justify-content:center;
    font-size:9px; color:#9ca3af; text-align:center; line-height:1.2; font-weight:600; }
.empty-session { text-align:center; color:var(--text-dim); font-size:14px; padding:40px 20px; }

/* MODALE PHOTO AGRANDIE */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:100;
    display:none; align-items:center; justify-content:center; padding:24px; }
.modal-overlay.show { display:flex; }
.modal-card { background:var(--card); border-radius:var(--radius); max-width:380px; width:100%; overflow:hidden; }
.modal-carousel { position:relative; width:100%; height:240px; overflow:hidden; }
.carousel-track { display:flex; height:100%; transition:transform .3s ease; }
.carousel-slide { min-width:100%; height:100%; background:#e5e7eb center/cover no-repeat;
    display:flex; align-items:flex-end; justify-content:flex-start; position:relative; }
.slide-label { background:rgba(0,0,0,.6); color:#fff; font-size:12px; font-weight:600;
    padding:5px 12px; border-radius:20px; margin:0 0 12px 12px; position:relative; z-index:2; }

.carousel-arrow { position:absolute; top:50%; transform:translateY(-50%);
    width:36px; height:36px; border-radius:50%; border:none; background:rgba(255,255,255,.85);
    font-size:22px; color:#1f2937; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.15); }
.carousel-arrow.left { left:10px; }
.carousel-arrow.right { right:10px; }
.carousel-dots { position:absolute; bottom:12px; left:0; right:0; display:flex; justify-content:center; gap:7px; }
.carousel-dots .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.5); transition:background .2s; }
.carousel-dots .dot.active { background:#fff; }
.modal-body { padding:20px; }
.modal-body h3 { font-size:20px; font-weight:800; margin-bottom:6px; }
.modal-meta { font-size:13px; color:var(--orange); font-weight:700; margin-bottom:12px; }
.modal-desc { font-size:14px; color:var(--text-dim); line-height:1.6; }
.modal-close { width:100%; margin-top:18px; background:var(--dark); color:#fff; border:none;
    padding:13px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>

<!-- ÉCRAN 1 : SÉLECTION -->
<div class="screen active" id="screenSelect">
    <div class="top">
        <a href="entrainements.html" class="back-btn">←</a>
        <h1>Choisir mes exercices</h1>
    </div>
    <div class="muscle-tabs" id="muscleTabs"></div>
    <div class="filter-tabs" id="filterTabs"></div>
    <p class="section-hint">Touche un exercice pour l'ajouter · <span class="swipe-hint">glisse ← → pour changer de muscle</span></p>
    <div class="ex-list" id="exList"></div>
    <div class="session-bar hidden" id="sessionBar" onclick="goToSession()">
        <span class="count"><span id="selCount">0</span> exercices sélectionnés</span>
        <span class="go">Ma séance →</span>
    </div>
</div>

<!-- ÉCRAN 2 : MA SÉANCE -->
<div class="screen" id="screenSession">
    <div class="top">
        <a href="#" class="back-btn" onclick="goToSelect();return false;">←</a>
        <h1>Ma séance</h1>
    </div>
    <div class="session-progress">
        <div class="big"><span id="doneCount">0</span>/<span id="totalCount">0</span></div>
        <div class="lbl">exercices terminés</div>
        <div class="bar"><div class="fill" id="progressFill"></div></div>
    </div>
    <div id="sessionList"></div>
</div>

<!-- MODALE PHOTO -->
<div class="modal-overlay" id="photoModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-card">
        <div class="modal-carousel">
            <div class="carousel-track" id="carouselTrack">
                <div class="carousel-slide" id="slide0"><span class="slide-label">Position de départ</span></div>
                <div class="carousel-slide" id="slide1"><span class="slide-label">Position finale</span></div>
            </div>
            <button class="carousel-arrow left" onclick="carouselMove(-1)">‹</button>
            <button class="carousel-arrow right" onclick="carouselMove(1)">›</button>
            <div class="carousel-dots" id="carouselDots"></div>
        </div>
        <div class="modal-body">
            <h3 id="modalName"></h3>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-desc" id="modalDesc"></div>
            <button class="modal-close" onclick="closeModal()">Fermer</button>
        </div>
    </div>
</div>

, "dos:0", "epaules:0", "triceps:2", "abdos:1"], "maison-pdc-3j-1": ["jambes:0", "jambes:2", "jambes:5", "abdos:4", "abdos:2"], "maison-pdc-3j-2": ["pecs:3", "jambes:0", "dos:0", "abdos:1", "abdos:0", "abdos:4", "abdos:3"], "maison-halteres-3j-0": ["pecs:5", "epaules:2", "biceps:1", "triceps:3", "abdos:1"], "maison-halteres-3j-1": ["jambes:2", "jambes:6", "jambes:5", "abdos:3", "abdos:0"], "maison-halteres-3j-2": ["pecs:1", "dos:3", "epaules:1", "biceps:2", "jambes:2", "abdos:1"], "salle-ppl-3j-0": ["pecs:0", "pecs:1", "epaules:0", "epaules:1", "triceps:1", "triceps:0"], "salle-ppl-3j-1": ["dos:0", "dos:1", "dos:2", "dos:3", "biceps:0", "biceps:2"], "salle-ppl-3j-2": ["jambes:0", "jambes:1", "jambes:2", "jambes:3", "jambes:4", "jambes:5"], "salle-half-4j-0": ["pecs:0", "dos:1", "epaules:0", "biceps:0", "triceps:0", "abdos:1"], "salle-half-4j-1": ["jambes:0", "jambes:1", "jambes:3", "jambes:4", "jambes:5", "abdos:0"], "salle-half-4j-2": ["pecs:1", "dos:0", "epaules:1", "biceps:2", "triceps:1", "abdos:3"], "salle-half-4j-3": ["jambes:2", "jambes:1", "jambes:6", "jambes:4", "jambes:5", "abdos:2"], "salle-ppl-6j-0": ["pecs:0", "pecs:1", "epaules:0", "epaules:1", "triceps:0", "triceps:1"], "salle-ppl-6j-1": ["dos:0", "dos:1", "dos:2", "dos:3", "biceps:0", "biceps:2"], "salle-ppl-6j-2": ["jambes:0", "jambes:1", "jambes:2", "jambes:3", "jambes:4", "jambes:5"], "salle-ppl-6j-3": ["pecs:5", "pecs:2", "epaules:2", "epaules:4", "triceps:3", "triceps:4"], "salle-ppl-6j-4": ["dos:6", "dos:4", "dos:0", "dos:3", "biceps:1", "biceps:3"], "salle-ppl-6j-5": ["jambes:0", "jambes:6", "jambes:2", "jambes:3", "jambes:4", "jambes:5"]};

const MUSCLES = [
  {key:'pecs', label:'Pecs'}, {key:'dos', label:'Dos'}, {key:'epaules', label:'Épaules'},
  {key:'biceps', label:'Biceps'}, {key:'triceps', label:'Triceps'}, {key:'jambes', label:'Jambes'}, {key:'abdos', label:'Abdos'},
];

// Filtres matériel
const FILTERS = [
  {key:'tout', label:'Tout', mats:null},
  {key:'rien', label:'Poids du corps', mats:['rien','traction']},
  {key:'halteres', label:'Haltères', mats:['rien','traction','halteres']},
  {key:'salle', label:'Salle', mats:['rien','traction','halteres','barre','machine']},
];
let currentFilter = 'tout';

function renderFilters(){
  const c = document.getElementById('filterTabs');
  c.innerHTML = FILTERS.map(f =>
    `<button class="filter-tab ${f.key===currentFilter?'active':''}" onclick="switchFilter('${f.key}')">${f.label}</button>`
  ).join('');
}

function switchFilter(key){
  currentFilter = key;
  renderFilters();
  renderExercises();
}

function exoVisible(ex){
  const f = FILTERS.find(x => x.key === currentFilter);
  if(!f.mats) return true; // "Tout"
  return f.mats.includes(ex.mat);
}
let currentMuscle = 0;
let selected = {}; // {muscleKey: Set(index)}
MUSCLES.forEach(m => selected[m.key] = new Set());

function renderTabs(){
  const c = document.getElementById('muscleTabs');
  c.innerHTML = MUSCLES.map((m,i) =>
    `<button class="muscle-tab ${i===currentMuscle?'active':''}" onclick="switchMuscle(${i})">${m.label}</button>`
  ).join('');
  // scroll l'onglet actif en vue
  const active = c.querySelector('.muscle-tab.active');
  if(active) active.scrollIntoView({inline:'center', behavior:'smooth', block:'nearest'});
}

function renderExercises(){
  const mKey = MUSCLES[currentMuscle].key;
  const list = EXERCISES[mKey] || [];
  const c = document.getElementById('exList');
  // Filtrer selon le matériel, mais garder l'index original
  const visible = list.map((ex,i) => ({ex, i})).filter(o => exoVisible(o.ex));
  if(visible.length === 0){
    c.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:14px;padding:40px 20px;">Aucun exercice pour ce muscle avec ce matériel.<br>Essaie un autre filtre.</div>';
    return;
  }
  c.innerHTML = visible.map(({ex,i}) => {
    const sel = selected[mKey].has(i);
    const bg = ex.imgId ? `style="background-image:url('${IMG_BASE}${ex.imgId}/0.jpg')"` : '';
    return `<div class="ex-item ${sel?'selected':''}" id="ex-${mKey}-${i}">
      <div class="ex-photo" ${bg} onclick="openModal('${mKey}',${i})"></div>
      <div class="ex-info" onclick="openModal('${mKey}',${i})">
        <div class="ex-name">${ex.nom}</div><div class="ex-meta">${ex.meta}</div>
      </div>
      <div class="ex-check" onclick="toggleSelect('${mKey}',${i})">✓</div>
    </div>`;
  }).join('');
}

function switchMuscle(i){
  currentMuscle = (i + MUSCLES.length) % MUSCLES.length;
  renderTabs(); renderExercises();
}

function toggleSelect(mKey, i){
  if(selected[mKey].has(i)) selected[mKey].delete(i);
  else selected[mKey].add(i);
  document.getElementById(`ex-${mKey}-${i}`).classList.toggle('selected');
  updateCount();
}

function updateCount(){
  let total = 0;
  MUSCLES.forEach(m => total += selected[m.key].size);
  document.getElementById('selCount').textContent = total;
  document.getElementById('sessionBar').classList.toggle('hidden', total===0);
}

function getSelectedExercises(){
  const out = [];
  MUSCLES.forEach(m => {
    selected[m.key].forEach(i => out.push(EXERCISES[m.key][i]));
  });
  return out;
}

function goToSession(){
  const exs = getSelectedExercises();
  const c = document.getElementById('sessionList');
  if(exs.length===0){ c.innerHTML = '<div class="empty-session">Aucun exercice sélectionné.</div>'; }
  else {
    c.innerHTML = exs.map((ex,i) =>
      `<div class="done-item" onclick="toggleDone(this)">
        <div class="done-check">✓</div>
        <div class="done-info"><div class="done-name">${ex.nom}</div><div class="done-meta">${ex.meta}</div></div>
        <div class="done-photo">PHOTO</div>
      </div>`
    ).join('');
  }
  document.getElementById('totalCount').textContent = exs.length;
  document.getElementById('doneCount').textContent = 0;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('screenSelect').classList.remove('active');
  document.getElementById('screenSession').classList.add('active');
  window.scrollTo(0,0);
}
function goToSelect(){
  document.getElementById('screenSession').classList.remove('active');
  document.getElementById('screenSelect').classList.add('active');
  window.scrollTo(0,0);
}
function toggleDone(el){
  el.classList.toggle('done');
  const total = document.querySelectorAll('#sessionList .done-item').length;
  const done = document.querySelectorAll('#sessionList .done-item.done').length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('progressFill').style.width = (total? done/total*100:0)+'%';
}

let carouselIndex = 0;
const CAROUSEL_COUNT = 2;
const IMG_BASE = 'https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/';
function renderDots(){
  const c = document.getElementById('carouselDots');
  c.innerHTML = Array.from({length:CAROUSEL_COUNT}, (_,i) =>
    `<div class="dot ${i===carouselIndex?'active':''}"></div>`).join('');
}
function carouselMove(dir){
  carouselIndex = (carouselIndex + dir + CAROUSEL_COUNT) % CAROUSEL_COUNT;
  document.getElementById('carouselTrack').style.transform = `translateX(-${carouselIndex*100}%)`;
  renderDots();
}

function openModal(mKey, i){
  const ex = EXERCISES[mKey][i];
  document.getElementById('modalName').textContent = ex.nom;
  document.getElementById('modalMeta').textContent = ex.meta;
  document.getElementById('modalDesc').textContent = ex.desc;
  // Charger les 2 vraies photos depuis la base
  const id = ex.imgId;
  if(id){
    document.getElementById('slide0').style.backgroundImage = `url('${IMG_BASE}${id}/0.jpg')`;
    document.getElementById('slide1').style.backgroundImage = `url('${IMG_BASE}${id}/1.jpg')`;
  } else {
    document.getElementById('slide0').style.backgroundImage = 'none';
    document.getElementById('slide1').style.backgroundImage = 'none';
  }
  // reset carrousel
  carouselIndex = 0;
  document.getElementById('carouselTrack').style.transform = 'translateX(0%)';
  renderDots();
  document.getElementById('photoModal').classList.add('show');
}
function closeModal(){ document.getElementById('photoModal').classList.remove('show'); }

// SWIPE entre muscles
let touchStartX = 0;
const selectScreen = document.getElementById('screenSelect');
selectScreen.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive:true});
selectScreen.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if(Math.abs(dx) > 60){
    if(dx < 0) switchMuscle(currentMuscle+1); // slide gauche = muscle suivant
    else switchMuscle(currentMuscle-1);
  }
}, {passive:true});

// SWIPE sur le carrousel photo
let carStartX = 0;
const carTrack = document.getElementById('carouselTrack');
carTrack.addEventListener('touchstart', e => { carStartX = e.changedTouches[0].screenX; }, {passive:true});
carTrack.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - carStartX;
  if(Math.abs(dx) > 40){ carouselMove(dx < 0 ? 1 : -1); }
}, {passive:true});

// INIT
renderTabs();
renderFilters();
renderExercises();
updateCount();

// Pré-sélection depuis une séance de programme (?s=seanceId&t=titre&f=filtre)
(function loadFromProgram(){
  const params = new URLSearchParams(window.location.search);
  const seanceId = params.get('s');
  const titre = params.get('t');
  const filtre = params.get('f');

  // Pré-activer un filtre matériel si fourni
  if(filtre && FILTERS.find(x => x.key === filtre)){
    currentFilter = filtre;
    renderFilters();
    renderExercises();
  }

  if(!seanceId || !SESSION_EXOS[seanceId]) return;

  // Construire un index nom -> {muscle, i} pour retrouver les exercices
  const refs = SESSION_EXOS[seanceId]; // ex: ["pecs:0","triceps:1"]
  refs.forEach(ref => {
    const [mKey, idx] = ref.split(':');
    const i = parseInt(idx);
    if(EXERCISES[mKey] && EXERCISES[mKey][i]){
      selected[mKey].add(i);
    }
  });
  updateCount();

  // Afficher un bandeau avec le titre de la séance
  if(titre){
    const banner = document.createElement('div');
    banner.style.cssText = 'background:var(--dark);color:#fff;border-radius:14px;padding:14px 16px;margin:0 4px 16px;font-size:14px;';
    banner.innerHTML = `<div style="font-weight:800;font-size:15px;margin-bottom:2px;">${decodeURIComponent(titre)}</div><div style="color:#cbd5e1;font-size:12.5px;">Exercices pré-sélectionnés · tu peux les modifier</div>`;
    const content = document.getElementById('screenSelect');
    const hint = content.querySelector('.section-hint');
    hint.parentNode.insertBefore(banner, hint);
  }

  // Rafraîchir l'affichage des exercices (pour montrer les cochés)
  renderExercises();
})();
</script>
