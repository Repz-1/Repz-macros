<div id="repzSplash">
  <img class="sp-sym" src="belfit-logo-b.png" alt="BELFIT">
  <img class="sp-txt" src="belfit-logo-full.png" alt="BelFit">
</div>
<script>
(function(){
  var s=document.getElementById('repzSplash');
  if(!s) return;
  var seen=null; try{ seen=sessionStorage.getItem('repz_splash'); }catch(e){}
  if(seen){ s.remove(); if(tc) tc.setAttribute('content',old); return; }
  try{ sessionStorage.setItem('repz_splash','1'); }catch(e){}
  var tc=document.querySelector('meta[name="theme-color"]');
  var old='#F8F8F8'; /* couleur claire de la page, restauree quand le splash part */
  var t0=Date.now(), MIN=500, done=false;
  function hide(){
    if(done) return; done=true;
    var wait=Math.max(0, MIN-(Date.now()-t0));
    setTimeout(function(){
      s.classList.add('hide');
      if(tc&&old) tc.setAttribute('content',old);
      setTimeout(function(){ if(s)s.remove(); },300);
    }, wait);
  }
  /* Se cache quand l'iframe du Journal a fini de charger (plus de flash blanc) */
  document.addEventListener('DOMContentLoaded', function(){
    var f0=document.getElementById('f0');
    if(!f0){ hide(); return; }
    try{
      if(f0.contentDocument && f0.contentDocument.readyState==='complete' && f0.contentWindow.location.href!=='about:blank'){ hide(); return; }
    }catch(e){}
    f0.addEventListener('load', hide);
  });
  /* Filet de sécurité : jamais plus de 4s */
  setTimeout(hide, 4000);
})();
</script>

<script>
const deck = document.getElementById('deck');
const W = () => window.innerWidth;
let idx = 0;          // onglet courant
let dragDx = 0;       // déplacement du doigt en cours
let animating = false;

function applyX(withTransition){
    deck.style.transition = withTransition ? 'transform .32s cubic-bezier(.2,.9,.25,1.07)' : 'none';
    deck.style.transform = 'translateX(' + (-(idx * W()) + dragDx) + 'px)';
}

function majNav(){
    document.querySelectorAll('#shellNav .bn-item').forEach((b,i)=> b.classList.toggle('active', i===idx));
}

function chargerFrame(i){
    const f = document.getElementById('f'+i);
    if(f && f.dataset.src){ f.src = f.dataset.src; delete f.dataset.src; }
}

let depuisHistorique = false;
function goTo(i){
    if(i < 0 || i > 3 || i === idx) { dragDx = 0; applyX(true); return; }
    chargerFrame(i);
    idx = i; dragDx = 0;
    applyX(true);
    majNav();
    // Historique : le bouton retour ramène à l'onglet précédent (et quitte depuis le Journal)
    if(!depuisHistorique){ try{ history.pushState({tab:i}, '', '#'+i); }catch(e){} }
    depuisHistorique = false;
}
window.addEventListener('popstate', function(ev){
    const t = (ev.state && typeof ev.state.tab === 'number') ? ev.state.tab : 0;
    depuisHistorique = true;
    goTo(t);
});

// Précharger les autres onglets après le démarrage
window.addEventListener('load', ()=> setTimeout(()=>{ chargerFrame(1); chargerFrame(2); chargerFrame(3); }, 400));
window.addEventListener('resize', ()=> applyX(false));

// ===== Gestes transmis par les pages embarquées (postMessage) =====
window.addEventListener('message', (e)=>{
    const d = e.data || {};
    if(typeof d.belfitTab === 'number'){ goTo(d.belfitTab); return; }
    if(d.belfitAction === 'openWeight'){
        goTo(0);
        // laisser le journal s'afficher puis ouvrir la modale de pesee
        setTimeout(()=>{ try{ document.getElementById('f0').contentWindow.openWeightModal(); }catch(err){} }, 300);
        return;
    }
    if(!d.bfS) return;
    if(d.bfS === 'move'){
        // borner aux extrémités (résistance)
        let dx = d.dx;
        if((idx === 0 && dx > 0) || (idx === 3 && dx < 0)) dx = dx / 3;
        dragDx = dx;
        // précharger le panneau vers lequel on tire
        chargerFrame(dx < 0 ? idx+1 : idx-1);
        applyX(false);
    } else if(d.bfS === 'end'){
        const seuil = W() * 0.15;
        const vx = d.vx || 0;                       // vélocité au relâcher (px/ms)
        const flick = Math.abs(vx) > 0.45;          // geste vif à la fin
        if(flick){
            // Comme en natif : la DIRECTION du relâcher décide (même après un aller-retour)
            goTo(idx + (vx < 0 ? 1 : -1));
        } else if(Math.abs(d.dx) > seuil){
            goTo(idx + (d.dx < 0 ? 1 : -1));
        } else { dragDx = 0; applyX(true); }
    } else if(d.bfS === 'cancel'){
        dragDx = 0; applyX(true);
    }
});

// Onglet initial via l'ancre (main.html#2 = Stats), sinon Journal
(function(){
    const h = parseInt((location.hash || '').replace('#',''), 10);
    if(!isNaN(h) && h >= 0 && h <= 3){ idx = h; chargerFrame(h); }
})();

// ===== LIENS DIRECTS =====
// Permet d'envoyer l'utilisateur droit au bon endroit depuis l'aide :
// main.html?aller=poids ouvre le Journal ET la fenetre de pesee.
// Sans cela, une reponse de la FAQ ne peut qu'expliquer un chemin.
(function(){
    const DESTINATIONS = {
        poids:    { onglet: 0, url: 'app.html?poids=1' },
        scan:     { onglet: 0, url: 'app.html?scan=1' },
        vocal:    { onglet: 0, url: 'app.html?vocal=1' },
        courses:  { onglet: 0, url: 'app.html?courses=1' },
        journal:  { onglet: 0 },
        entrainer:{ onglet: 1 },
        stats:    { onglet: 2 },
        premium:  { onglet: 3 },
    };
    // Un code promo passe dans l'adresse est transmis a la page Premium.
    const _promo = new URLSearchParams(location.search).get('promo');
    if(_promo){ try { sessionStorage.setItem('belfit_promo', _promo); } catch(e){} }
    const cle = new URLSearchParams(location.search).get('aller');
    if(!cle || !DESTINATIONS[cle]) return;
    const dest = DESTINATIONS[cle];
    idx = dest.onglet;
    const frame = document.getElementById('f' + dest.onglet);
    if(frame && dest.url){
        frame.src = dest.url;
        frame.removeAttribute('data-src');
    } else {
        chargerFrame(dest.onglet);
    }
    applyX(false);
    majNav();
    // L'adresse est nettoyee : un rafraichissement ne rouvre pas la fenetre.
    history.replaceState(null, '', 'main.html#' + dest.onglet);
})();
applyX(false);
majNav();
</script>
