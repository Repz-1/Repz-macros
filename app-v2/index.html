<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/icon-192-v7.png">
<title>BelFit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#F8F8F8;font-family:'Manrope',sans-serif;color:#181818}
  #splash{position:fixed;inset:0;z-index:9999;background:#0a0a0a;display:flex;align-items:center;justify-content:center;transition:opacity .25s ease}
  #splash img{width:120px;height:120px;border-radius:28px}
  #splash.parti{opacity:0;pointer-events:none}
</style>
</head>
<body>
<!-- Splash : reste jusqu'au premier rendu, evite tout flash blanc -->
<div id="splash">
  <img src="/belfit-logo-b.png" alt="BelFit">
</div>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="gradOr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC933"/>
      <stop offset="100%" stop-color="#F7B500"/>
    </linearGradient>
  </defs>
</svg>
<div id="app"></div>
<script type="module" src="/src/main.jsx"></script>
<script>
  // Service worker : ouverture instantanee depuis le cache
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js', { scope: '/v2/' }).then(function(reg){
        // Nouvelle version detectee : on l'active et on recharge une seule fois
        reg.addEventListener('updatefound', function(){
          var sw = reg.installing;
          if (!sw) return;
          sw.addEventListener('statechange', function(){
            if (sw.state === 'installed' && navigator.serviceWorker.controller) {
              if (!window.__bfRecharge) { window.__bfRecharge = true; window.location.reload(); }
            }
          });
        });
      }).catch(function(){});
    });
  }
</script>
</body>
</html>
