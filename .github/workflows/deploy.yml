name: Deploy BELFIT

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Garde-fou : le JavaScript de chaque page doit etre valide.
      # Un push casse ne part pas en production.
      - name: Verifier le JavaScript des pages
        run: node tools/verif-js.js

      # Chantier v2 arrete (19 juillet 2026). Son build est retire du
      # deploiement. Le code reste dans app-v2/ ; voir app-v2/README.md.

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
