name: Deploy BELFIT
# Phase 0 de la migration : deploiement du site tel quel via Actions.
# La Phase 1 remplacera l'upload direct par un build Vite (npm ci && npm run build, artifact = dist/).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-v2/package-lock.json
      # Build du chantier v2 (Preact/Vite) -> dossier v2/ servi sur belfit.be/v2/
      - run: npm ci
        working-directory: app-v2
      - run: npm run build
        working-directory: app-v2
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
