name: Deploy BELFIT

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Garde-fou : le JavaScript de chaque page doit etre valide.
      # Un push casse ne part pas en production.
      - name: Verifier le JavaScript des pages
        run: node tools/verif-js.js

      # Build de la v2 (Preact + Vite) -> dossier /v2
      - name: Installer les dependances v2
        working-directory: app-v2
        run: npm ci
      - name: Construire la v2
        working-directory: app-v2
        run: npm run build
      - name: Verifier que la v2 se peint reellement
        working-directory: app-v2
        run: npm install jsdom --no-save --silent && node smoke.mjs

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
