name: Deploy BELFIT
# Deploiement du site sur GitHub Pages.
#
# Le chantier v2 (Preact/Vite, dossier app-v2/) est EN PAUSE : son build a ete
# retire de ce workflow. Le code reste dans le depot et le dossier v2/ deja
# construit reste en ligne, mais plus rien n'est recompile a chaque push.
# Pour le reprendre : reintroduire setup-node + npm ci + npm run build
# (working-directory: app-v2), voir l'historique git.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Garde-fou : le JavaScript de chaque page doit etre syntaxiquement valide.
      # Un push casse ne part pas en production.
      - name: Verifier le JavaScript des pages
        run: node tools/verif-js.js

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
