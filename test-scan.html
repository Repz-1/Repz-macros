<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPZ — Test Scanner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --orange:#FF6B35; --green:#047857; --bg:#f3f4f6; --card:#fff; --text:#1a1a1a; --dim:#6b7280; --line:#e5e7eb; }
body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; padding:16px;
}
h1 { font-size:22px; font-weight:800; margin-bottom:4px; text-align:center; }
.sub { font-size:13px; color:var(--dim); text-align:center; margin-bottom:24px; }

.btn {
    display:block; width:100%; max-width:420px; margin:0 auto 16px;
    padding:16px; border:none; border-radius:14px; font-size:16px; font-weight:700;
    cursor:pointer; transition:all .15s;
}
.btn-scan { background:var(--orange); color:#fff; }
.btn-scan:active { transform:scale(.98); opacity:.9; }
.btn-stop { background:#374151; color:#fff; }

#reader {
    max-width:420px; margin:0 auto 16px; border-radius:14px; overflow:hidden;
    display:none;
}
#reader.show { display:block; }

.result {
    max-width:420px; margin:0 auto; background:var(--card); border-radius:14px;
    padding:20px; box-shadow:0 4px 16px rgba(0,0,0,.08); display:none;
}
.result.show { display:block; }
.result h2 { font-size:18px; font-weight:800; margin-bottom:4px; }
.result .brand { font-size:13px; color:var(--dim); margin-bottom:16px; }
.macros { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.macro { background:var(--bg); border-radius:10px; padding:12px; text-align:center; }
.macro .v { font-size:20px; font-weight:800; color:var(--orange); }
.macro .l { font-size:12px; color:var(--dim); margin-top:2px; }
.macro.kcal .v { color:var(--green); }

.status {
    max-width:420px; margin:0 auto 16px; padding:14px; border-radius:10px;
    font-size:14px; text-align:center; display:none;
}
.status.show { display:block; }
.status.info { background:#dbeafe; color:#1e40af; }
.status.error { background:#fee2e2; color:#991b1b; }
.status.success { background:#dcfce7; color:#166534; }

.manual {
    max-width:420px; margin:24px auto 0; text-align:center;
}
.manual input {
    width:60%; padding:12px; border:1.5px solid var(--line); border-radius:10px;
    font-size:15px; text-align:center;
}
.manual button {
    padding:12px 18px; border:none; border-radius:10px; background:var(--green);
    color:#fff; font-weight:700; margin-left:8px; cursor:pointer;
}
.hint { font-size:12px; color:var(--dim); margin-top:8px; }
</style>
</head>
<body>

<h1>🔍 Test Scanner REPZ</h1>
<p class="sub">Scanne un code-barres ou tape-le à la main</p>

<button class="btn btn-scan" id="startBtn" onclick="startScan()">📷 Scanner un produit</button>
<button class="btn btn-stop" id="stopBtn" onclick="stopScan()" style="display:none;">Arrêter la caméra</button>

<div id="reader"></div>

<div class="status" id="status"></div>

<div class="result" id="result">
    <h2 id="prodName">—</h2>
    <div class="brand" id="prodBrand"></div>
    <div class="macros">
        <div class="macro kcal"><div class="v" id="mKcal">0</div><div class="l">kcal / 100g</div></div>
        <div class="macro"><div class="v" id="mProt">0</div><div class="l">protéines</div></div>
        <div class="macro"><div class="v" id="mCarbs">0</div><div class="l">glucides</div></div>
        <div class="macro"><div class="v" id="mLip">0</div><div class="l">lipides</div></div>
    </div>
</div>

<!-- Saisie manuelle du code-barres (pour tester sans caméra) -->
<div class="manual">
    <input type="text" id="manualCode" placeholder="Ex: 3017620422003" inputmode="numeric">
    <button onclick="lookupManual()">Chercher</button>
    <div class="hint">Pour tester sans caméra : tape le code-barres d'un produit (chiffres sous le code).</div>
</div>

<!-- Librairie de scan html5-qrcode -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
let html5QrCode = null;

function showStatus(msg, type){
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = 'status show ' + type;
}

function startScan(){
    document.getElementById('result').classList.remove('show');
    document.getElementById('reader').classList.add('show');
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    showStatus('Démarrage de la caméra...', 'info');

    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 150 } },
        (decodedText) => {
            // Code détecté
            stopScan();
            showStatus('Code détecté : ' + decodedText, 'success');
            lookupProduct(decodedText);
        },
        (err) => { /* ignore les erreurs de scan continu */ }
    ).catch((err) => {
        showStatus('Impossible d\'ouvrir la caméra : ' + err, 'error');
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
    });
}

function stopScan(){
    if(html5QrCode){
        html5QrCode.stop().then(() => {
            html5QrCode.clear();
            document.getElementById('reader').classList.remove('show');
        }).catch(()=>{});
    }
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
}

function lookupManual(){
    const code = document.getElementById('manualCode').value.trim();
    if(code) lookupProduct(code);
}

async function lookupProduct(barcode){
    showStatus('Recherche du produit...', 'info');
    try {
        const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
        const data = await res.json();

        if(data.status !== 1 || !data.product){
            showStatus('Produit non trouvé dans la base OpenFoodFacts.', 'error');
            return;
        }

        const p = data.product;
        const n = p.nutriments || {};

        document.getElementById('prodName').textContent = p.product_name || 'Produit sans nom';
        document.getElementById('prodBrand').textContent = p.brands || '';
        document.getElementById('mKcal').textContent = Math.round(n['energy-kcal_100g'] || 0);
        document.getElementById('mProt').textContent = (n.proteins_100g || 0) + 'g';
        document.getElementById('mCarbs').textContent = (n.carbohydrates_100g || 0) + 'g';
        document.getElementById('mLip').textContent = (n.fat_100g || 0) + 'g';

        document.getElementById('result').classList.add('show');
        showStatus('✅ Produit trouvé !', 'success');
    } catch(err){
        showStatus('Erreur réseau : ' + err.message, 'error');
    }
}
</script>

</body>
</html>
