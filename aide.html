<!DOCTYPE html>
<html lang="fr">
<head>
<style>html{background:#F5F6F8!important;margin:0}body{margin:0!important;background:radial-gradient(150% 380px at 50% 0,#fbf3dc 0%,#F5F6F8 100%)!important}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f7efd9">
<title>BELFIT — Aide</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32-v5.png">
<link rel="apple-touch-icon" href="apple-touch-icon-v7.png">
<style>
:root{ --em:#F7B500; --em-dark:#8F6200; --text:#1a1a1a; --dim:#6b7280; --line:#eee9e0; --card:#ffffff; --bg:#F5F6F8; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
.container { max-width:900px; margin:0 auto; padding:16px 16px 120px; }
.back-btn { display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:50%; background:#fff; border:1.5px solid var(--line); color:var(--text); text-decoration:none; font-size:19px; }
.page-title { font-size:24px; font-weight:800; margin:10px 2px 4px; }
.page-sub { font-size:14px; color:var(--dim); margin:0 2px 20px; }
.sec-label { font-size:13px; font-weight:800; letter-spacing:.07em; color:#8a8375; text-transform:uppercase; margin:0 4px 10px; }

/* FAQ */
.faq-card { background:var(--card); border:1.5px solid #e7e2d9; border-radius:20px; box-shadow:0 6px 18px rgba(60,50,40,.07); margin-bottom:22px; overflow:hidden; }
.faq-item { border-bottom:1px solid var(--line); }
.faq-item:last-child { border-bottom:none; }
.faq-q { display:flex; justify-content:space-between; align-items:center; gap:12px; width:100%; background:none; border:none; text-align:left; padding:16px; font-size:15px; font-weight:700; color:var(--text); cursor:pointer; font-family:inherit; }
.faq-q .fq-arr { color:#c4bcae; font-size:15px; transition:transform .18s; flex:none; }
.faq-item.open .fq-arr { transform:rotate(180deg); }
.faq-a { display:none; padding:0 16px 16px; font-size:14px; color:var(--dim); line-height:1.6; }
.faq-item.open .faq-a { display:block; }

/* Bulle de contact */
.chat-fab { position:fixed; bottom:22px; right:18px; z-index:120; width:58px; height:58px; border-radius:50%; border:none; background:var(--em); color:#fff; box-shadow:0 8px 22px rgba(247,181,0,.4); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.chat-fab svg { width:27px; height:27px; stroke:#fff; fill:none; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round; }
.chat-fab:active { transform:scale(.94); }
.chat-panel { display:none; position:fixed; bottom:92px; right:16px; left:16px; max-width:400px; margin-left:auto; z-index:121; background:#fff; border-radius:20px; box-shadow:0 16px 44px rgba(15,23,42,.24); overflow:hidden; }
.chat-panel.show { display:block; animation:cpUp .2s ease-out; }
@keyframes cpUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
.cp-head { background:linear-gradient(160deg,#F7B500,#DFA004); color:#fff; padding:15px 17px; }
.cp-head h3 { font-size:16px; font-weight:800; }
.cp-head p { font-size:12.5px; opacity:.9; margin-top:2px; }
.cp-body { padding:14px 15px 15px; }
.cp-body textarea { width:100%; min-height:96px; padding:12px; border:1.5px solid #e5e0d6; border-radius:12px; font-size:14px; font-family:inherit; resize:vertical; }
.cp-body textarea:focus { outline:none; border-color:var(--em); }
.cp-send { display:block; width:100%; margin-top:10px; background:var(--em); color:#fff; border:none; border-radius:12px; padding:13px; font-size:14.5px; font-weight:800; cursor:pointer; font-family:inherit; }
.cp-ok { display:none; text-align:center; font-size:13px; font-weight:700; color:#8F6200; padding-top:10px; }
</style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAN07MM-t2wIPSwoo0shrV1OfMfIDC-Z0I",
  authDomain: "repz-baf60.firebaseapp.com",
  projectId: "repz-baf60",
  storageBucket: "repz-baf60.firebasestorage.app",
  messagingSenderId: "403252293048",
  appId: "1:403252293048:web:e7db6aed4ba92f0ebfb34d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
</script>

<div class="container">
    <a href="parametres.html" class="back-btn">←</a>
    <div class="page-title">Obtenir de l'aide</div>
    <div class="page-sub">Les réponses aux questions les plus fréquentes. Besoin de plus ? Écris-nous via la bulle en bas à droite.</div>

    <div class="sec-label">Questions fréquentes</div>
    <div class="faq-card" id="faqCard"></div>
</div>

<!-- BULLE DE CONTACT -->
<button class="chat-fab" onclick="toggleChat()" aria-label="Nous contacter">
    <svg viewBox="0 0 24 24"><path d="M21 12a8 8 0 01-8 8H5l-2 2V12a8 8 0 018-8h2a8 8 0 018 8z"/><path d="M8 11h.01M12 11h.01M16 11h.01"/></svg>
</button>
<div class="chat-panel" id="chatPanel">
    <div class="cp-head">
        <h3>Écris-nous 💬</h3>
        <p>Ton coach BELFIT te répond sous 24–48h par e-mail.</p>
    </div>
    <div class="cp-body">
        <textarea id="chatMsg" placeholder="Décris ta question ou ton problème…"></textarea>
        <button class="cp-send" onclick="envoyerMessage()">Envoyer au coach</button>
        <div class="cp-ok" id="chatOk">Message envoyé ✓ Réponse sous 24–48h.</div>
    </div>
</div>

<script>
/* ===== CONFIG EMAILJS (même config que le questionnaire, à compléter sur PC) ===== */
const EMAILJS_PUBLIC_KEY  = 'xW0Iwer6fS9vnAQ39';
const EMAILJS_SERVICE_ID  = 'service_kpiz7rc';
const EMAILJS_TEMPLATE_ID = 'template_ah0jhvr';

// ===== FAQ =====
const FAQ = [
    { q:"C'est quoi BELFIT ?", a:"BELFIT est une application belge de nutrition et d'entraînement avec un vrai coach humain. Tu suis ton alimentation et tes séances dans l'app, et ton coach construit ton programme personnalisé." },
    { q:"Comment fonctionne le programme personnalisé ?", a:"En Premium, tu remplis un questionnaire détaillé (objectif, préférences, allergies, rythme de vie). Ton coach l'analyse et te livre ton programme personnalisé sous 24 à 48h par e-mail. Pas d'algorithme automatique : un vrai coach travaille sur ton dossier." },
    { q:"Que comprend l'abonnement Premium ?", a:"Le programme nutrition personnalisé par le coach, la bibliothèque de programmes d'entraînement, le calculateur avancé, les idées recettes adaptées à tes calories restantes, l'historique illimité et 2 ajustements de macros + 2 ajustements de calories par mois." },
    { q:"Comment ajuster mes calories ou mes macros ?", a:"Profil → Répartition des macros ou Ajustement des calories. En Premium, tu disposes de 2 ajustements par mois pour chacun : ta demande part chez ton coach, qui adapte ton plan sous 24–48h." },
    { q:"Comment scanner un produit ?", a:"Dans le journal, ouvre un repas puis utilise l'icône scan pour lire le code-barres. Le produit est ajouté au repas et sauvegardé définitivement dans ta base personnelle d'aliments." },
    { q:"Comment enregistrer mon poids ?", a:"Dans le journal, bouton « Mon poids », ou via la note de rappel en haut de page si tu ne t'es pas encore pesé aujourd'hui. Ton évolution est visible dans Stats." },
    { q:"Où sont stockées mes données ?", a:"Ton compte et ton statut Premium sont sécurisés chez Firebase (Google, serveurs européens). Ton journal, tes pesées et tes aliments personnalisés sont stockés sur ton appareil. Pense à ne pas effacer les données du navigateur sans exporter." },
    { q:"Comment annuler mon abonnement ?", a:"Ton abonnement est géré par notre partenaire de paiement Lemon Squeezy : utilise le lien de gestion reçu dans ton e-mail de confirmation d'achat, ou écris-nous via la bulle de contact et on s'en occupe." },
    { q:"J'ai un code promo, où l'utiliser ?", a:"Sur la page Premium au moment de choisir ta formule. Si tu as un souci avec un code, contacte-nous via la bulle." },
    { q:"L'app fonctionne-t-elle hors ligne ?", a:"Le journal et tes données locales restent accessibles, mais la connexion est nécessaire pour te connecter, scanner des produits et synchroniser ton statut Premium." },
    { q:"Comment vous contacter ?", a:"Via la bulle de conversation en bas à droite de cette page, ou par e-mail à contact@belfit.be. Réponse sous 24–48h." }
];
document.getElementById('faqCard').innerHTML = FAQ.map((f,i)=>`
    <div class="faq-item" id="faq${i}">
        <button class="faq-q" onclick="toggleFaq(${i})"><span>${f.q}</span><span class="fq-arr">▾</span></button>
        <div class="faq-a">${f.a}</div>
    </div>`).join('');
function toggleFaq(i){
    const el = document.getElementById('faq'+i);
    const dejaOuvert = el.classList.contains('open');
    document.querySelectorAll('.faq-item').forEach(x=>x.classList.remove('open'));
    if(!dejaOuvert) el.classList.add('open');
}

// ===== BULLE DE CONTACT =====
function toggleChat(){
    const el = document.getElementById('chatPanel');
    if(el.classList.contains('show')){
        if(history.state && history.state.belfitOv){ history.back(); } else { el.classList.remove('show'); }
    } else {
        el.classList.add('show');
        history.pushState({belfitOv:'chatPanel'}, '');
    }
}
window.addEventListener('popstate', function(){
    const el = document.getElementById('chatPanel');
    if(el && el.classList.contains('show')){ el.classList.remove('show'); }
});
// Type de demande (question / suggestion), pilotable via ?chat=
let typeDemande = 'Message assistance';
(function(){
    const c = new URLSearchParams(location.search).get('chat');
    if(!c) return;
    if(c === 'suggestion') typeDemande = 'Suggestion d\'amélioration';
    else if(c === 'question') typeDemande = 'Question';
    // Ouvrir la bulle automatiquement à l'arrivée
    window.addEventListener('DOMContentLoaded', function(){
        setTimeout(function(){
            const el = document.getElementById('chatPanel');
            if(el && !el.classList.contains('show')) toggleChat();
            const msg = document.getElementById('chatMsg');
            if(msg && c === 'suggestion') msg.placeholder = 'Ton idée pour améliorer BELFIT...';
        }, 250);
    });
})();
function envoyerMessage(){
    const msg = document.getElementById('chatMsg').value.trim();
    if(!msg){ alert('Écris ton message d\'abord.'); return; }
    const user = auth.currentUser;
    const email = user && user.email ? user.email : '';
    const params = {
        type_demande: typeDemande,
        client_email: email,
        prenom: localStorage.getItem('repz_firstName') || '—',
        message: msg
    };
    const ok = ()=>{
        document.getElementById('chatMsg').value = '';
        document.getElementById('chatOk').style.display = 'block';
        setTimeout(()=>{ document.getElementById('chatOk').style.display='none'; toggleChat(); }, 1600);
    };
    if(EMAILJS_PUBLIC_KEY !== 'A_REMPLACER' && EMAILJS_TEMPLATE_ID !== 'A_REMPLACER' && window.emailjs){
        emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
        emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params).then(ok).catch(()=>{ mailtoFallback(msg, email); });
    } else {
        mailtoFallback(msg, email);
    }
}
function mailtoFallback(msg, email){
    // EmailJS indisponible : on prévient honnêtement au lieu d'ouvrir l'appli mail par surprise
    const panel = document.getElementById('chatPanel');
    if(panel){
        const sujet = encodeURIComponent(typeDemande + ' — BELFIT');
        const corps = encodeURIComponent('Message : ' + msg + '\n\nMon compte : ' + email);
        const lien = 'mailto:contact@belfit.be?subject=' + sujet + '&body=' + corps;
        let fb = document.getElementById('chatFallback');
        if(!fb){
            fb = document.createElement('div');
            fb.id = 'chatFallback';
            fb.style.cssText = 'margin-top:10px;background:#FFF9E8;border:1px solid #F3D98A;border-radius:12px;padding:12px;font-size:13px;color:#8F6200;font-weight:600;line-height:1.5;';
            const zone = document.getElementById('chatMsg').parentElement;
            zone.appendChild(fb);
        }
        fb.innerHTML = 'L\'envoi direct est momentanément indisponible. '
            + '<a href="' + lien + '" style="display:inline-block;margin-top:8px;background:#F7B500;color:#181818;text-decoration:none;font-weight:800;padding:9px 14px;border-radius:10px;">Envoyer par e-mail</a>'
            + '<span style="display:block;margin-top:6px;font-size:11.5px;color:#9a8a5a;">Ton message est prêt — appuie sur Envoyer dans ton appli mail.</span>';
    }
}
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){});}</script>
</body>
</html>
