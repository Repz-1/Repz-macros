<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --orange:#F7B500; --bg:#eeece7; --card:#fcfbf8; --dark:#1f2937;
    --line:#e7e3da; --text:#1a1a1a; --text-dim:#6b7280; --radius:20px; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; padding:16px 16px 40px; }
.topbar-app {
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 20px; margin:-16px -16px 8px;
    background:linear-gradient(160deg,#F7B500 0%,#DFA004 100%);
}
.topbar-home {
    display:inline-flex; align-items:center; justify-content:center;
    width:40px; height:40px; border-radius:50%;
    background:rgba(255,255,255,.15); border:1.5px solid rgba(255,255,255,.3);
    color:#fff; text-decoration:none;
}
.topbar-home svg { width:21px; height:21px; }
.topbar-home:active { background:rgba(255,255,255,.25); transform:scale(.94); }
.premium-pill { display:inline-flex; align-items:center; gap:5px; color:#1a1a1a; text-decoration:none;
    font-size:13px; font-weight:800; padding:8px 15px; border-radius:30px;
    background:#f5d76e; border:1.5px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.2); }
.premium-pill:active { transform:scale(.95); }
.top { display:flex; align-items:center; gap:14px; padding:8px 4px 18px; }
.back-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--line);
    background:var(--card); display:flex; align-items:center; justify-content:center;
    font-size:20px; color:var(--text); text-decoration:none; cursor:pointer; flex-shrink:0; }
.top h1 { font-size:20px; font-weight:800; letter-spacing:-.02em; }

.screen { display:none; }
.screen.active { display:block; }

.intro-txt { font-size:14px; color:var(--text-dim); margin:0 4px 18px; line-height:1.5; }

/* Catégories */
.cat-list { display:flex; flex-direction:column; gap:12px; }
.cat-card { display:flex; align-items:center; gap:16px; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius); padding:20px;
    cursor:pointer; box-shadow:0 4px 16px rgba(15,23,42,.05); transition:transform .15s; }
.cat-card:active { transform:scale(.98); }
.cat-emoji { width:50px; height:50px; flex-shrink:0; border-radius:14px;
    background:rgba(16,185,129,.12); display:flex; align-items:center; justify-content:center; font-size:26px; }
.cat-info { flex:1; }
.cat-name { font-size:17px; font-weight:700; }
.cat-sub { font-size:13px; color:var(--text-dim); margin-top:2px; }
.cat-arrow { color:var(--orange); font-size:20px; }

/* ===== WIZARD ===== */
.wiz-progress { height:5px; background:#e7e3da; border-radius:6px; overflow:hidden; margin:2px 2px 22px; }
.wiz-progress span { display:block; height:100%; width:0; background:#F7B500; border-radius:6px; transition:width .35s cubic-bezier(.4,0,.2,1); }
.wiz-q { font-size:23px; font-weight:800; letter-spacing:-.02em; margin:0 2px 4px; }
.wiz-step { font-size:13px; font-weight:700; color:#DFA004; letter-spacing:.06em; text-transform:uppercase; margin:0 2px 18px; }
.wiz-opts { display:flex; flex-direction:column; gap:12px; }
.wiz-opt { display:flex; align-items:center; gap:16px; background:var(--card); border:1.5px solid var(--line);
    border-radius:18px; padding:18px 18px; cursor:pointer; transition:transform .12s, border-color .15s, box-shadow .15s;
    box-shadow:0 2px 10px rgba(24,24,24,.04); text-align:left; }
.wiz-opt:active { transform:scale(.98); }
.wiz-opt.sel { border-color:#F7B500; background:#FFFBEF; }
.wiz-opt-emoji { font-size:30px; flex-shrink:0; width:40px; text-align:center; }
.wiz-opt-main { flex:1; min-width:0; display:flex; flex-direction:column; }
.wiz-opt-title { display:block; font-size:16.5px; font-weight:800; }
.wiz-opt-sub { display:block; font-size:13px; color:var(--text-dim); font-weight:600; margin-top:3px; }
.wiz-opt-arrow { color:#c9c2b4; font-size:22px; }
.wiz-nums { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
.wiz-num { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:800;
    background:var(--card); border:1.5px solid var(--line); border-radius:16px; cursor:pointer; transition:transform .12s, border-color .15s; }
.wiz-num:active { transform:scale(.94); }
.wiz-num.sel { border-color:#F7B500; background:#F7B500; color:#fff; }
.wiz-back { display:inline-flex; align-items:center; gap:6px; background:none; border:none; color:var(--text-dim);
    font-size:14px; font-weight:700; cursor:pointer; margin:18px 2px 0; padding:6px 0; }
.wiz-browse { display:block; text-align:center; color:var(--text-dim); font-size:13.5px; font-weight:700;
    text-decoration:underline; margin:26px auto 4px; cursor:pointer; background:none; border:none; width:100%; }
/* Résultat */
.wiz-result-badge { display:inline-flex; align-items:center; gap:7px; background:#FFF4D6; color:#8F6200;
    font-size:12.5px; font-weight:800; padding:7px 13px; border-radius:20px; margin-bottom:14px; }
.wiz-recap { display:flex; flex-wrap:wrap; gap:7px; margin:14px 2px 4px; }
.wiz-recap span { background:#f1ede4; color:#6b7280; font-size:12px; font-weight:700; padding:5px 11px; border-radius:20px; }
.wiz-cta { display:block; width:100%; background:#F7B500; color:#1a1a1a; border:none; border-radius:16px;
    padding:16px; font-size:16px; font-weight:800; cursor:pointer; margin-top:18px; box-shadow:0 6px 16px rgba(247,181,0,.3); }
.wiz-cta:active { transform:scale(.99); }

/* Programmes */
.niv-filter { display:flex; gap:8px; margin:0 2px 18px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; }
.niv-filter::-webkit-scrollbar { display:none; }
.niv-pill { flex-shrink:0; padding:8px 17px; border-radius:30px; font-size:13px; font-weight:700;
    border:1.5px solid var(--line); background:var(--card); color:var(--text-dim); cursor:pointer; white-space:nowrap; transition:transform .12s; }
.niv-pill.active { background:#F7B500; border-color:#F7B500; color:#fff; }
.niv-pill:active { transform:scale(.95); }
.prog-list { display:flex; flex-direction:column; gap:14px; }
.niveau-sep { font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:#DFA004; margin:22px 2px 12px; }
.niveau-sep:first-child { margin-top:4px; }
.prog-card { position:relative; overflow:hidden; background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px 16px; cursor:pointer; box-shadow:0 4px 16px rgba(15,23,42,.05); transition:transform .15s; }
.prog-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:#F7B500; }
.prog-card:active { transform:scale(.98); }
.prog-badge { display:inline-block; font-size:11px; font-weight:800; text-transform:uppercase;
    letter-spacing:.05em; background:#ecfdf5; color:#047857; padding:5px 11px; border-radius:20px; margin-bottom:11px; }
.prog-name { font-size:18px; font-weight:800; margin-bottom:6px; letter-spacing:-.01em; }
.prog-desc { font-size:13.5px; color:var(--text-dim); line-height:1.5; margin-bottom:14px; }
.prog-stats { display:flex; flex-wrap:wrap; gap:8px; }
.prog-stats span { display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text-dim);
    background:#f4f2ec; padding:6px 11px; border-radius:9px; }
.prog-stats b { color:var(--text); font-weight:700; }
.prog-stats svg { width:15px; height:15px; stroke:#F7B500; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

/* Séances */
.seance-list { display:flex; flex-direction:column; gap:12px; }
.seance-card { display:flex; align-items:center; gap:14px; background:var(--card);
    border:1px solid var(--line); border-radius:16px; padding:16px 18px; cursor:pointer;
    box-shadow:0 4px 16px rgba(15,23,42,.05); transition:transform .15s; }
.seance-card:active { transform:scale(.98); }
.seance-num { width:42px; height:42px; flex-shrink:0; border-radius:12px; background:#F7B500;

.seance-info { flex:1; }
.seance-title { font-size:16px; font-weight:700; }
.seance-sub { font-size:12.5px; color:var(--text-dim); margin-top:2px; }
.seance-arrow { color:var(--orange); font-size:18px; }

.soon-note { text-align:center; color:var(--text-dim); font-size:13px; padding:30px 20px; line-height:1.5; }
</style>
</head>

<style>

#repzSplash.hide{opacity:0;pointer-events:none;}
#repzSplash .sp-sym{width:200px;max-width:56%;height:auto;animation:spPop .6s ease-out both;}
#repzSplash .sp-txt{position:absolute;bottom:5%;left:50%;transform:translateX(-50%);width:150px;max-width:46%;height:auto;}
@keyframes spPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}


</style>
<div id="repzSplash">
  <img class="sp-sym" src="logo-symbol.png" alt="BELFIT">
  <img class="sp-txt" src="logo-text.png" alt="REP Z">
</div>
<script>
(function(){
  var s=document.getElementById('repzSplash');
  if(!s) return;
  var seen=null; try{ seen=sessionStorage.getItem('repz_splash'); }catch(e){} if(seen){ s.remove(); return; }
  try{ sessionStorage.setItem('repz_splash','1'); }catch(e){}
  setTimeout(function(){ s.classList.add('hide'); setTimeout(function(){ if(s)s.remove(); },550); }, 1600);
})();
</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAN07MM-t2wIPSwoo0shrV1OfMfIDC-Z0I",
  authDomain: "repz-baf60.firebaseapp.com",
  projectId: "repz-baf60",
  storageBucket: "repz-baf60.firebasestorage.app",
  messagingSenderId: "403252293048",
  appId: "1:403252293048:web:e7db6aed4ba92f0ebfb34d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
let authVerifie = false;
auth.onAuthStateChanged((user) => {
    const estInvite = localStorage.getItem('repz_invite') === '1';
    if(user) { authVerifie = true; localStorage.removeItem('repz_invite'); }
    else if(estInvite) { authVerifie = true; }
    else if(!authVerifie) {
        // Firebase peut renvoyer null avant d'avoir fini : on attend avant de rediriger
        setTimeout(() => {
            if(!auth.currentUser && localStorage.getItem('repz_invite') !== '1'){
                window.location.href = "index.html";
            }
        }, 1200);
    }
});
// Protection Premium : la bibliothèque de programmes est réservée aux membres Premium
function repzAcces(){
    return localStorage.getItem('repz_premium') === '1';
}
if(!repzAcces()){
    window.location.href = 'entrainements.html?premium=1';
}
function logout(){
    // Déconnexion : on nettoie aussi le statut local (premium, invité)
    localStorage.removeItem('repz_premium');
    localStorage.removeItem('repz_invite');
    localStorage.removeItem('repz_inviteDebut');
    sessionStorage.removeItem('repz_premSynced');
    auth.signOut().finally(()=>{ window.location.href='index.html'; });
}
</script>

const WIZ_OBJECTIFS = [
    {key:'muscle',    emoji:'💪', title:'Construire du muscle', sub:'Prendre du volume et de la masse'},
    {key:'gras',      emoji:'🔥', title:'Perdre du gras',       sub:'Sécher et se définir'},
    {key:'maintien',  emoji:'⚖️', title:'Maintenir mon physique', sub:'Rester en forme et entretenir'},
    {key:'condition', emoji:'🏃', title:'Améliorer ma condition', sub:'Cardio, endurance, énergie'},
];
let wizState = { step:1, objectif:null, jours:null };

function showWizard(){
    ['screenCats','screenProgs','screenSeances'].forEach(id=>document.getElementById(id).classList.remove('active'));
    document.getElementById('screenWizard').classList.add('active');
    window.scrollTo(0,0);
    renderWizard();
}

function renderWizard(){
    const bar = document.getElementById('wizBar');
    const body = document.getElementById('wizBody');
    const pct = wizState.step === 'result' ? 100 : (wizState.step/2)*100;
    bar.style.width = pct + '%';

    if(wizState.step === 1){
        body.innerHTML = `
            <div class="wiz-step">Étape 1 / 2</div>
            <div class="wiz-q">Quel est ton objectif ?</div>
            <div class="wiz-opts">${WIZ_OBJECTIFS.map(o=>`
                <button class="wiz-opt ${wizState.objectif===o.key?'sel':''}" onclick="wizPick('objectif','${o.key}')">
                    <span class="wiz-opt-emoji">${o.emoji}</span>
                    <span class="wiz-opt-main"><span class="wiz-opt-title">${o.title}</span><span class="wiz-opt-sub">${o.sub}</span></span>
                    <span class="wiz-opt-arrow">→</span>
                </button>`).join('')}</div>
            <button class="wiz-browse" onclick="showCats()">Parcourir tous les programmes</button>`;
    }
    else if(wizState.step === 2){
        body.innerHTML = `
            <div class="wiz-step">Étape 2 / 2</div>
            <div class="wiz-q">Combien de séances par semaine ?</div>
            <div class="wiz-nums">${[2,3,4,5,6].map(n=>`
                <button class="wiz-num ${wizState.jours===n?'sel':''}" onclick="wizPick('jours',${n})">${n}</button>`).join('')}</div>
            <button class="wiz-back" onclick="wizGoto(1)">← Retour</button>`;
    }
    else if(wizState.step === 'result'){
        const { cat, prog } = routeProgram(wizState.objectif, wizState.jours);
        const objLabel = (WIZ_OBJECTIFS.find(o=>o.key===wizState.objectif)||{}).title || '';
        if(!prog){
            body.innerHTML = `<div class="wiz-q">Hmm, aucune correspondance</div>
                <p class="intro-txt">On n'a pas trouvé de programme exact. Parcours la bibliothèque, tu y trouveras ton bonheur.</p>
                <button class="wiz-cta" onclick="showCats()">Voir tous les programmes</button>
                <button class="wiz-back" onclick="wizRestart()">← Recommencer</button>`;
            return;
        }
        body.innerHTML = `
            <div class="wiz-result-badge">✨ Ton programme BelFit</div>
            <div class="wiz-q">${prog.name}</div>
            <p class="intro-txt" style="margin-bottom:6px">${prog.desc}</p>
            <div class="wiz-recap">
                <span>${objLabel}</span><span>${wizState.jours} séances / sem.</span><span>${prog.niveau}</span>
            </div>
            <div style="margin-top:16px">${(function(){ progState={catKey:cat}; return carteProg(prog); })()}</div>
            <button class="wiz-cta" onclick="showSeances('${cat}','${prog.id}')">Voir mon programme →</button>
            <button class="wiz-back" onclick="wizRestart()">← Modifier mes réponses</button>`;
    }
}

function wizPick(field, val){
    wizState[field] = val;
    renderWizard(); // reflète la sélection
    setTimeout(()=>{
        if(field==='objectif') wizGoto(2);
        else if(field==='jours'){ wizState.step='result'; renderWizard(); window.scrollTo(0,0); }
    }, 180);
}
function wizGoto(step){ wizState.step = step; renderWizard(); window.scrollTo(0,0); }
function wizRestart(){ wizState = { step:1, objectif:null, jours:null }; renderWizard(); window.scrollTo(0,0); }

// Route les réponses vers le programme existant le plus adapté (salle uniquement)
function routeProgram(obj, jours){
    let cat;
    if(obj === 'muscle') cat = 'masse';
    else if(obj === 'gras' || obj === 'condition') cat = 'seche';
    else cat = 'salle'; // maintien
    let pool = (PROGRAMMES[cat] || []).slice();
    let best = null, bestDiff = 99;
    pool.forEach(p => { const d = Math.abs(p.seances.length - jours); if(d < bestDiff){ bestDiff = d; best = p; } });
    if(obj === 'maintien' && bestDiff > 1){
        (PROGRAMMES.masse || []).forEach(p => { const d = Math.abs(p.seances.length - jours); if(d < bestDiff){ bestDiff = d; best = p; cat = 'masse'; } });
    }
    return { cat, prog: best };
}

    return `<div class="prog-card" onclick="showSeances('${progState.catKey}','${p.id}')">

function renderProgList(){
    const c = document.getElementById('progList');
    const { parNiveau, niveauxPresents, sel } = progState;
    const niveauxAff = (sel === 'Tous') ? niveauxPresents : [sel];
    const showHeaders = niveauxAff.length > 1;
    c.innerHTML = niveauxAff.map(niv =>
        (showHeaders ? `<div class="niveau-sep">${niv}</div>` : '') +
        parNiveau[niv].map(carteProg).join('')
    ).join('');
    document.querySelectorAll('.niv-pill').forEach(b => b.classList.toggle('active', b.dataset.niv === sel));
}

function selectNiveau(niv){
    progState.sel = niv;
    renderProgList();
    window.scrollTo(0,0);
}

function showProgs(catKey){
    currentCat = catKey;
    const cat = CATEGORIES.find(c => c.key === catKey);
    document.getElementById('progTitle').textContent = cat.name;
    const progs = PROGRAMMES[catKey] || [];
    const filterEl = document.getElementById('nivFilter');
    const c = document.getElementById('progList');
    if(progs.length === 0){
        filterEl.innerHTML = ''; filterEl.style.display = 'none';
        c.innerHTML = `<div class="soon-note">Les programmes "${cat.name}" arrivent bientôt.<br>La catégorie Prise de masse est déjà disponible en exemple.</div>`;
    } else {
        const ordre = ['Débutant','Intermédiaire','Confirmé'];
        const parNiveau = {};
        progs.forEach(p => { (parNiveau[p.niveau] = parNiveau[p.niveau] || []).push(p); });
        const niveauxPresents = ordre.filter(n => parNiveau[n] && parNiveau[n].length);
        progState = { catKey, parNiveau, niveauxPresents, sel: niveauxPresents[0] };
        if(niveauxPresents.length > 1){
            const opts = ['Tous', ...niveauxPresents];
            filterEl.innerHTML = opts.map(o => `<button class="niv-pill" data-niv="${o}" onclick="selectNiveau('${o}')">${o}</button>`).join('');
            filterEl.style.display = 'flex';
        } else {
            filterEl.innerHTML = ''; filterEl.style.display = 'none';
        }
        renderProgList();
    }
    document.getElementById('screenWizard').classList.remove('active');
    document.getElementById('screenCats').classList.remove('active');
    document.getElementById('screenSeances').classList.remove('active');
    document.getElementById('screenProgs').classList.add('active');
    window.scrollTo(0,0);
}

function showSeances(catKey, progId){
    const prog = (PROGRAMMES[catKey] || []).find(p => p.id === progId);
    if(!prog) return;
    // Déterminer le filtre matériel selon le programme
    let filtre = 'tout';
    document.getElementById('seanceTitle').textContent = prog.name;
    document.getElementById('seanceIntro').textContent = `${prog.duree} · niveau ${prog.niveau}. Choisis une séance pour voir les exercices.`;
    document.getElementById('seanceList').innerHTML = prog.seances.map((s,i) => {
        const seanceId = progId + '-' + i;
        return `<div class="seance-card" onclick="window.location.href='ma-seance.html?v=10&s=${encodeURIComponent(seanceId)}&t=${encodeURIComponent(s.titre)}&f=${filtre}'">
            <div class="seance-num">J${i+1}</div>
            <div class="seance-info"><div class="seance-title">${s.titre}</div><div class="seance-sub">${s.sub}</div></div>
            <div class="seance-arrow">→</div>
        </div>`;
    }).join('');
    document.getElementById('screenWizard').classList.remove('active');
    document.getElementById('screenProgs').classList.remove('active');
    document.getElementById('screenCats').classList.remove('active');
    document.getElementById('screenSeances').classList.add('active');
    window.scrollTo(0,0);
}

<script>
/* ===== SYNC PREMIUM depuis Firestore (source de vérité = le compte) ===== */
(function(){
  function syncPremium(u){
    if(!u || !window.firebase || !firebase.firestore) return;
    firebase.firestore().collection('users').doc(u.uid).get().then(function(doc){
      var prem = doc.exists && doc.data().premium === true;
      var had = localStorage.getItem('repz_premium') === '1';
      if(prem){ localStorage.setItem('repz_premium','1'); }
      else { localStorage.removeItem('repz_premium'); }
      if(prem !== had && !sessionStorage.getItem('repz_premSynced')){
        sessionStorage.setItem('repz_premSynced','1');
        location.reload();
      }
    }).catch(function(e){ console.warn('premium sync', e); });
  }
  try{
    if(window.firebase && firebase.auth){
      firebase.auth().onAuthStateChanged(function(u){ if(u) syncPremium(u); });
    }
  }catch(e){}
})();
</script>
