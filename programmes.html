<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPZ — Programmes</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --orange:#FF6B35; --bg:#f3f4f6; --card:#ffffff; --dark:#1f2937;
    --line:#e5e7eb; --text:#1a1a1a; --text-dim:#6b7280; --radius:20px; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; padding:16px 16px 40px; }
.top { display:flex; align-items:center; gap:14px; padding:8px 4px 18px; }
.back-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--line);
    background:var(--card); display:flex; align-items:center; justify-content:center;
    font-size:20px; color:var(--text); text-decoration:none; cursor:pointer; flex-shrink:0; }
.top h1 { font-size:20px; font-weight:800; letter-spacing:-.02em; }

.screen { display:none; }
.screen.active { display:block; }

.intro-txt { font-size:14px; color:var(--text-dim); margin:0 4px 18px; line-height:1.5; }

/* Catégories */
.cat-list { display:flex; flex-direction:column; gap:12px; }
.cat-card { display:flex; align-items:center; gap:16px; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius); padding:20px;
    cursor:pointer; box-shadow:0 4px 16px rgba(15,23,42,.05); transition:transform .15s; }
.cat-card:active { transform:scale(.98); }
.cat-emoji { width:50px; height:50px; flex-shrink:0; border-radius:14px;
    background:rgba(255,107,53,.12); display:flex; align-items:center; justify-content:center; font-size:26px; }
.cat-info { flex:1; }
.cat-name { font-size:17px; font-weight:700; }
.cat-sub { font-size:13px; color:var(--text-dim); margin-top:2px; }
.cat-arrow { color:var(--orange); font-size:20px; }

/* Programmes */
.prog-list { display:flex; flex-direction:column; gap:12px; }
.prog-card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px; cursor:pointer; box-shadow:0 4px 16px rgba(15,23,42,.05); transition:transform .15s; }
.prog-card:active { transform:scale(.98); }
.prog-badge { display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.04em; background:#fff1e0; color:#c2410c; padding:4px 10px; border-radius:20px; margin-bottom:10px; }
.prog-name { font-size:18px; font-weight:800; margin-bottom:6px; }
.prog-desc { font-size:13.5px; color:var(--text-dim); line-height:1.5; margin-bottom:12px; }
.prog-stats { display:flex; gap:14px; font-size:12.5px; color:var(--text-dim); }
.prog-stats span { display:flex; align-items:center; gap:5px; }
.prog-stats b { color:var(--text); }

/* Séances */
.seance-list { display:flex; flex-direction:column; gap:12px; }
.seance-card { display:flex; align-items:center; gap:14px; background:var(--card);
    border:1px solid var(--line); border-radius:16px; padding:16px 18px; cursor:pointer;
    box-shadow:0 4px 16px rgba(15,23,42,.05); transition:transform .15s; }
.seance-card:active { transform:scale(.98); }
.seance-num { width:42px; height:42px; flex-shrink:0; border-radius:12px; background:var(--dark);
    color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; }
.seance-info { flex:1; }
.seance-title { font-size:16px; font-weight:700; }
.seance-sub { font-size:12.5px; color:var(--text-dim); margin-top:2px; }
.seance-arrow { color:var(--orange); font-size:18px; }

.soon-note { text-align:center; color:var(--text-dim); font-size:13px; padding:30px 20px; line-height:1.5; }
</style>
</head>
<body>

<!-- ÉCRAN 1 : CATÉGORIES -->
<div class="screen active" id="screenCats">
    <div class="top">
        <a href="entrainements.html" class="back-btn">←</a>
        <h1>Choisir un programme</h1>
    </div>
    <p class="intro-txt">Choisis ton objectif, on te propose des programmes prêts à suivre.</p>
    <div class="cat-list" id="catList"></div>
</div>

<!-- ÉCRAN 2 : PROGRAMMES -->
<div class="screen" id="screenProgs">
    <div class="top">
        <a href="#" class="back-btn" onclick="showCats();return false;">←</a>
        <h1 id="progTitle">Programmes</h1>
    </div>
    <div class="prog-list" id="progList"></div>
</div>

<!-- ÉCRAN 3 : SÉANCES -->
<div class="screen" id="screenSeances">
    <div class="top">
        <a href="#" class="back-btn" onclick="showProgs(currentCat);return false;">←</a>
        <h1 id="seanceTitle">Séances</h1>
    </div>
    <p class="intro-txt" id="seanceIntro"></p>
    <div class="seance-list" id="seanceList"></div>
</div>

<script>
// ===== DONNÉES =====
const CATEGORIES = [
    {key:'masse', emoji:'💪', name:'Prise de masse', sub:'Prendre du muscle et du volume'},
    {key:'debutant', emoji:'🌱', name:'Débutant', sub:'Commencer en douceur'},
    {key:'seche', emoji:'🔥', name:'Perte de poids', sub:'Brûler et se définir'},
    {key:'maison', emoji:'🏠', name:'Maison', sub:'Sans matériel'},
    {key:'salle', emoji:'🏋️', name:'Salle', sub:'Machines et charges libres'},
];

// Programmes par catégorie (Prise de masse complète, autres à venir)
const PROGRAMMES = {
    masse: [
        {
            id:'masse-3j', badge:'3 jours/semaine', name:'Prise de masse — 3 jours',
            desc:'Le classique pour construire du muscle. Idéal si tu débutes la prise de masse.',
            duree:'8 semaines', niveau:'Intermédiaire',
            seances:[
                {titre:'Jour 1 — Pecs / Triceps', sub:'6 exercices · ~60 min'},
                {titre:'Jour 2 — Dos / Biceps', sub:'6 exercices · ~60 min'},
                {titre:'Jour 3 — Jambes / Épaules', sub:'6 exercices · ~65 min'},
            ]
        },
        {
            id:'masse-4j', badge:'4 jours/semaine', name:'Prise de masse — 4 jours',
            desc:'Plus de volume par muscle pour progresser plus vite. Pour pratiquants réguliers.',
            duree:'10 semaines', niveau:'Confirmé',
            seances:[
                {titre:'Jour 1 — Pecs', sub:'5 exercices · ~55 min'},
                {titre:'Jour 2 — Dos', sub:'5 exercices · ~55 min'},
                {titre:'Jour 3 — Jambes', sub:'5 exercices · ~60 min'},
                {titre:'Jour 4 — Épaules / Bras', sub:'6 exercices · ~55 min'},
            ]
        },
        {
            id:'masse-5j', badge:'5 jours/semaine', name:'Prise de masse — 5 jours (split)',
            desc:'Un muscle par jour pour un volume maximal. Pour les confirmés qui veulent pousser fort.',
            duree:'12 semaines', niveau:'Confirmé',
            seances:[
                {titre:'Jour 1 — Pecs', sub:'5 exercices · ~55 min'},
                {titre:'Jour 2 — Dos', sub:'5 exercices · ~60 min'},
                {titre:'Jour 3 — Jambes', sub:'6 exercices · ~65 min'},
                {titre:'Jour 4 — Épaules', sub:'5 exercices · ~50 min'},
                {titre:'Jour 5 — Bras (biceps/triceps)', sub:'6 exercices · ~50 min'},
            ]
        },
    ],
    debutant: [
        {
            id:'deb-full-3j', badge:'3 jours/semaine', name:'Débutant — Full body',
            desc:'Tout le corps à chaque séance. La meilleure façon de démarrer la musculation en douceur.',
            duree:'6 semaines', niveau:'Débutant',
            seances:[
                {titre:'Séance A — Corps complet', sub:'6 exercices · ~50 min'},
                {titre:'Séance B — Corps complet', sub:'6 exercices · ~50 min'},
                {titre:'Séance C — Corps complet', sub:'6 exercices · ~50 min'},
            ]
        },
        {
            id:'deb-2j', badge:'2 jours/semaine', name:'Débutant — Remise en route',
            desc:'Deux séances par semaine pour reprendre le sport sans se blesser. Parfait pour bien commencer.',
            duree:'4 semaines', niveau:'Débutant',
            seances:[
                {titre:'Séance A — Haut du corps', sub:'5 exercices · ~40 min'},
                {titre:'Séance B — Bas du corps + gainage', sub:'5 exercices · ~40 min'},
            ]
        },
    ],
    seche: [
        {
            id:'seche-full-3j', badge:'3 jours/semaine', name:'Perte de poids — Full body',
            desc:'Des séances complètes et dynamiques qui brûlent un maximum de calories.',
            duree:'8 semaines', niveau:'Intermédiaire',
            seances:[
                {titre:'Séance A — Full body + cardio', sub:'7 exercices · ~50 min'},
                {titre:'Séance B — Full body + cardio', sub:'7 exercices · ~50 min'},
                {titre:'Séance C — Full body + cardio', sub:'7 exercices · ~50 min'},
            ]
        },
        {
            id:'seche-circuit-4j', badge:'4 jours/semaine', name:'Perte de poids — Circuits',
            desc:'Enchaînements en circuit pour garder le cardio élevé et fondre plus vite.',
            duree:'8 semaines', niveau:'Intermédiaire',
            seances:[
                {titre:'Jour 1 — Haut du corps', sub:'6 exercices · ~45 min'},
                {titre:'Jour 2 — Bas du corps', sub:'6 exercices · ~45 min'},
                {titre:'Jour 3 — Full body', sub:'7 exercices · ~50 min'},
                {titre:'Jour 4 — Cardio + abdos', sub:'5 exercices · ~40 min'},
            ]
        },
    ],
    maison: [
        {
            id:'maison-pdc-3j', badge:'Sans matériel', name:'Maison — Poids du corps',
            desc:'Aucun matériel nécessaire. Juste toi, ton tapis et ta motivation.',
            duree:'6 semaines', niveau:'Débutant',
            seances:[
                {titre:'Séance A — Haut du corps', sub:'6 exercices · ~40 min'},
                {titre:'Séance B — Bas du corps', sub:'6 exercices · ~40 min'},
                {titre:'Séance C — Full body + gainage', sub:'7 exercices · ~45 min'},
            ]
        },
        {
            id:'maison-halteres-3j', badge:'Avec haltères', name:'Maison — Avec haltères',
            desc:'Une paire d\'haltères suffit pour un programme complet à domicile.',
            duree:'8 semaines', niveau:'Intermédiaire',
            seances:[
                {titre:'Jour 1 — Haut du corps', sub:'6 exercices · ~45 min'},
                {titre:'Jour 2 — Bas du corps', sub:'6 exercices · ~45 min'},
                {titre:'Jour 3 — Full body', sub:'6 exercices · ~50 min'},
            ]
        },
    ],
    salle: [
        {
            id:'salle-ppl-3j', badge:'3 jours/semaine', name:'Salle — Push / Pull / Legs',
            desc:'Le grand classique en salle : pousser, tirer, jambes. Efficace et structuré.',
            duree:'10 semaines', niveau:'Intermédiaire',
            seances:[
                {titre:'Push — Pecs / Épaules / Triceps', sub:'6 exercices · ~60 min'},
                {titre:'Pull — Dos / Biceps', sub:'6 exercices · ~60 min'},
                {titre:'Legs — Jambes complètes', sub:'6 exercices · ~65 min'},
            ]
        },
        {
            id:'salle-half-4j', badge:'4 jours/semaine', name:'Salle — Half body',
            desc:'Le corps en deux moitiés, travaillées deux fois par semaine. Bon compromis volume/récup.',
            duree:'10 semaines', niveau:'Intermédiaire',
            seances:[
                {titre:'Jour 1 — Haut du corps', sub:'6 exercices · ~60 min'},
                {titre:'Jour 2 — Bas du corps', sub:'6 exercices · ~60 min'},
                {titre:'Jour 3 — Haut du corps', sub:'6 exercices · ~60 min'},
                {titre:'Jour 4 — Bas du corps', sub:'6 exercices · ~60 min'},
            ]
        },
        {
            id:'salle-ppl-6j', badge:'6 jours/semaine', name:'Salle — PPL x2',
            desc:'Push/Pull/Legs répété deux fois par semaine. Pour les confirmés très assidus.',
            duree:'12 semaines', niveau:'Confirmé',
            seances:[
                {titre:'Jour 1 — Push', sub:'6 exercices · ~60 min'},
                {titre:'Jour 2 — Pull', sub:'6 exercices · ~60 min'},
                {titre:'Jour 3 — Legs', sub:'6 exercices · ~65 min'},
                {titre:'Jour 4 — Push', sub:'6 exercices · ~60 min'},
                {titre:'Jour 5 — Pull', sub:'6 exercices · ~60 min'},
                {titre:'Jour 6 — Legs', sub:'6 exercices · ~65 min'},
            ]
        },
    ],
};

let currentCat = null;

function renderCats(){
    document.getElementById('catList').innerHTML = CATEGORIES.map(c =>
        `<div class="cat-card" onclick="showProgs('${c.key}')">
            <div class="cat-emoji">${c.emoji}</div>
            <div class="cat-info"><div class="cat-name">${c.name}</div><div class="cat-sub">${c.sub}</div></div>
            <div class="cat-arrow">→</div>
        </div>`
    ).join('');
}

function showCats(){
    document.getElementById('screenProgs').classList.remove('active');
    document.getElementById('screenSeances').classList.remove('active');
    document.getElementById('screenCats').classList.add('active');
    window.scrollTo(0,0);
}

function showProgs(catKey){
    currentCat = catKey;
    const cat = CATEGORIES.find(c => c.key === catKey);
    document.getElementById('progTitle').textContent = cat.name;
    const progs = PROGRAMMES[catKey] || [];
    const c = document.getElementById('progList');
    if(progs.length === 0){
        c.innerHTML = `<div class="soon-note">Les programmes "${cat.name}" arrivent bientôt.<br>La catégorie Prise de masse est déjà disponible en exemple.</div>`;
    } else {
        c.innerHTML = progs.map(p =>
            `<div class="prog-card" onclick="showSeances('${catKey}','${p.id}')">
                <span class="prog-badge">${p.badge}</span>
                <div class="prog-name">${p.name}</div>
                <div class="prog-desc">${p.desc}</div>
                <div class="prog-stats">
                    <span>📅 <b>${p.duree}</b></span>
                    <span>📊 <b>${p.niveau}</b></span>
                    <span>🗓️ <b>${p.seances.length} séances</b></span>
                </div>
            </div>`
        ).join('');
    }
    document.getElementById('screenCats').classList.remove('active');
    document.getElementById('screenSeances').classList.remove('active');
    document.getElementById('screenProgs').classList.add('active');
    window.scrollTo(0,0);
}

function showSeances(catKey, progId){
    const prog = (PROGRAMMES[catKey] || []).find(p => p.id === progId);
    if(!prog) return;
    document.getElementById('seanceTitle').textContent = prog.name;
    document.getElementById('seanceIntro').textContent = `${prog.duree} · niveau ${prog.niveau}. Choisis une séance pour voir les exercices.`;
    document.getElementById('seanceList').innerHTML = prog.seances.map((s,i) =>
        `<div class="seance-card" onclick="window.location.href='ma-seance.html'">
            <div class="seance-num">J${i+1}</div>
            <div class="seance-info"><div class="seance-title">${s.titre}</div><div class="seance-sub">${s.sub}</div></div>
            <div class="seance-arrow">→</div>
        </div>`
    ).join('');
    document.getElementById('screenProgs').classList.remove('active');
    document.getElementById('screenCats').classList.remove('active');
    document.getElementById('screenSeances').classList.add('active');
    window.scrollTo(0,0);
}

renderCats();
</script>
</body>
</html>
