<!DOCTYPE html>
<html lang="fr">
<head>
<style>html{background:#efece5!important;margin:0}body{margin:0!important;background:radial-gradient(150% 380px at 50% 0,#fbf3dc 0%,#efece5 100%)!important}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f7efd9">
<title>BELFIT — Connexion</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
    --orange:#F7B500; --green:#8F6200; --bg:#f3f4f6; --card:#ffffff;
    --dark:#1f2937; --line:#e5e7eb; --text:#1a1a1a; --text-dim:#6b7280; --radius:20px;
}
body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; padding:16px;
    display:flex; align-items:center; justify-content:center;
}

.auth-container {
    background:var(--card); border-radius:24px; padding:36px 26px;
    max-width:400px; width:100%; box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.auth-header {
    text-align:center; margin-bottom:32px;
}

.auth-logo {
    width:120px; height:auto; margin:0 auto 16px; display:block;
    filter:drop-shadow(0 4px 16px rgba(247,181,0,.18));
}

.auth-title {
    font-size:24px; font-weight:800; margin-bottom:6px;
}

.auth-subtitle {
    font-size:13px; color:var(--text-dim);
}

.auth-form {
    display:none;
}

.auth-form.active {
    display:block;
}

.form-group {
    margin-bottom:16px;
}

.label {
    display:block; font-size:13px; font-weight:700; margin-bottom:6px;
}

.input {
    width:100%; padding:12px; border:1.5px solid var(--line); border-radius:12px;
    font-size:15px; font-family:inherit;
}

.input:focus {
    outline:none; border-color:var(--orange); background:#FFFBEF;
}

.field-hint {
    font-size:12px; color:var(--text-dim); margin-top:6px;
}

.btn {
    width:100%; padding:14px; border:none; border-radius:14px; font-size:15px;
    font-weight:700; cursor:pointer; transition:all .15s;
}

.btn-primary {
    background:var(--orange); color:#fff;
}

.btn-primary:active {
    transform:scale(.98); opacity:.9;
}

.btn-primary:disabled {
    opacity:.5; cursor:not-allowed;
}

.toggle-form {
    text-align:center; margin-top:16px; font-size:13px; color:var(--text-dim);
}

.toggle-form a {
    color:var(--orange); font-weight:700; text-decoration:none; cursor:pointer;
}

.error {
    background:#fee2e2; color:#991b1b; padding:12px; border-radius:8px; margin-bottom:16px;
    font-size:13px; display:none;
}

.error.show {
    display:block;
}

.success {
    background:#FFFCF0; color:#166534; padding:12px; border-radius:8px; margin-bottom:16px;
    font-size:13px; display:none;
}

.success.show {
    display:block;
}

.loading {
    display:none; text-align:center; color:var(--orange); font-size:13px;
}

.loading.show {
    display:block;
}
</style>
</head>
<body>
<!-- SPLASH BELFIT -->
<style>
#repzSplash{position:fixed;inset:0;z-index:99999;background:#0a0a0a;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease;}
#repzSplash.hide{opacity:0;pointer-events:none;}
#repzSplash .sp-sym{width:200px;max-width:56%;height:auto;animation:spPop .6s ease-out both;}
#repzSplash .sp-txt{position:absolute;bottom:7%;left:50%;transform:translateX(-50%);width:230px;max-width:66%;height:auto;}
@keyframes spPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
#repzSplash .sp-bar{position:absolute;top:calc(50% + 130px);left:50%;transform:translateX(-50%);width:190px;max-width:56%;height:6px;background:rgba(255,255,255,.14);border-radius:6px;overflow:hidden;}
#repzSplash .sp-fill{height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,#FFC400,#F07818,#DE2F14);animation:spLoad 2.3s cubic-bezier(.25,.6,.35,1) forwards;}
@keyframes spLoad{0%{width:0}18%{width:31%}42%{width:52%}60%{width:64%}78%{width:83%}100%{width:100%}}
@keyframes spSpin{to{transform:translateX(-50%) rotate(360deg)}}
</style>
<div id="repzSplash">
  <img class="sp-sym" src="belfit-logo-b.png" alt="BELFIT">
  <img class="sp-txt" src="belfit-logo-full.png" alt="BelFit — Fitness, Nutrition, Bien-être">
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>
<script>
(function(){
  var s=document.getElementById('repzSplash');
  if(!s) return;
  var tc=document.querySelector('meta[name="theme-color"]');
  var origColor = tc ? tc.getAttribute('content') : null;
  if(sessionStorage.getItem('repz_splash')){ s.remove(); return; }
  if(tc) tc.setAttribute('content','#0a0a0a');
  setTimeout(function(){ s.classList.add('hide'); if(tc&&origColor) tc.setAttribute('content',origColor); setTimeout(function(){ if(s)s.remove(); },550); }, 2600);
})();
</script>


<div class="auth-container" id="authContainer" style="visibility:hidden;">
    <div class="auth-header">
        <p class="auth-subtitle">Ton suivi nutrition & fitness</p>
    </div>

    <!-- FORM LOGIN -->
    <form class="auth-form active" id="loginForm">
        <div class="error" id="loginError"></div>
        <div class="loading" id="loginLoading">Connexion en cours...</div>
        
        <div class="form-group">
            <label class="label">Email</label>
            <input type="email" class="input" id="loginEmail" placeholder="ton@email.com" required>
        </div>

        <div class="form-group">
            <label class="label">Mot de passe</label>
            <input type="password" class="input" id="loginPassword" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary">Se connecter</button>

        <div class="toggle-form">
            Pas de compte ? <a onclick="toggleForm('register')">Créer un compte</a>
        </div>

        <div class="toggle-form">
            <a onclick="toggleForm('recovery')">Mot de passe oublié ?</a>
        </div>
    </form>

    <!-- FORM REGISTER -->
    <form class="auth-form" id="registerForm">
        <div class="error" id="registerError"></div>
        <div class="loading" id="registerLoading">Création du compte...</div>

        <div class="form-group">
            <label class="label">Prénom</label>
            <input type="text" class="input" id="registerFirstName" placeholder="Ton prénom" required>
            <div class="field-hint">Pour personnaliser ton expérience sur BELFIT 😊</div>
        </div>

        <div class="form-group">
            <label class="label">Email</label>
            <input type="email" class="input" id="registerEmail" placeholder="ton@email.com" required>
        </div>

        <div class="form-group">
            <label class="label">Mot de passe (min 6 caractères)</label>
            <input type="password" class="input" id="registerPassword" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label class="label">Confirmer mot de passe</label>
            <input type="password" class="input" id="registerPasswordConfirm" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary">Créer un compte</button>

        <div class="toggle-form">
            Déjà un compte ? <a onclick="toggleForm('login')">Se connecter</a>
        </div>
    </form>

    <!-- FORM RECOVERY -->
    <form class="auth-form" id="recoveryForm">
        <div class="error" id="recoveryError"></div>
        <div class="success" id="recoverySuccess"></div>
        <div class="loading" id="recoveryLoading">Envoi du lien...</div>

        <div class="form-group">
            <label class="label">Email</label>
            <input type="email" class="input" id="recoveryEmail" placeholder="ton@email.com" required>
        </div>

        <button type="submit" class="btn btn-primary">Envoyer un lien de réinitialisation</button>

        <div class="toggle-form">
            <a onclick="toggleForm('login')">Retour à la connexion</a>
        </div>
    </form>

    <!-- SÉPARATEUR + INVITÉ -->
    <div style="margin-top:20px; padding-top:18px; border-top:1px solid #e5e7eb; text-align:center;">
        <a onclick="continuerInvite()" style="display:inline-block; color:#6b7280; font-size:14px; font-weight:600; cursor:pointer; text-decoration:none;">
            Découvrir l'appli sans compte →
        </a>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
// Vérifier que Firebase s'est bien chargé
if (typeof firebase === 'undefined') {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;"><h2>Connexion impossible</h2><p>Le service de connexion n\'a pas pu se charger. Vérifie ta connexion internet ou désactive ton bloqueur de publicités, puis recharge la page.</p></div>';
    throw new Error('Firebase non chargé');
}

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAN07MM-t2wIPSwoo0shrV1OfMfIDC-Z0I",
  authDomain: "repz-baf60.firebaseapp.com",
  projectId: "repz-baf60",
  storageBucket: "repz-baf60.firebasestorage.app",
  messagingSenderId: "403252293048",
  appId: "1:403252293048:web:e7db6aed4ba92f0ebfb34d"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
sessionStorage.removeItem('repz_premSynced');

// Vérifier si l'utilisateur est déjà connecté
auth.onAuthStateChanged((user) => {
    if(user) {
        // Déjà connecté : on nettoie le mode invité et on file à l'accueil
        localStorage.removeItem('repz_invite');
        window.location.href = 'app.html';
    } else {
        // Pas connecté : on affiche le formulaire de connexion
        // Le splash reste "consommé" ici pour ne pas le rejouer après login
        sessionStorage.setItem('repz_splash','1');
        document.getElementById('authContainer').style.visibility = 'visible';
    }
});

// Mode découverte : navigation libre, actions bloquées jusqu'à la création du compte
function continuerInvite() {
    localStorage.setItem('repz_invite', '1');
    // Une session Firebase encore active écraserait le mode invité : on la coupe d'abord
    auth.signOut().finally(()=>{ window.location.href = 'app.html'; });
}

function toggleForm(formName) {
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById(formName + 'Form').classList.add('active');
    document.querySelectorAll('.error, .success, .loading').forEach(e => e.classList.remove('show'));
}

// LOGIN
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    const loadingDiv = document.getElementById('loginLoading');
    
    errorDiv.classList.remove('show');
    loadingDiv.classList.add('show');
    
    try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        // Récupérer le prénom du profil pour l'afficher
        if(cred && cred.user && cred.user.displayName){
            localStorage.setItem('repz_firstName', cred.user.displayName);
        }
        window.location.href = 'app.html';
    } catch(error) {
        loadingDiv.classList.remove('show');
        let message = 'Email ou mot de passe incorrect';
        if(error.code === 'auth/user-not-found') message = 'Compte non trouvé';
        if(error.code === 'auth/wrong-password') message = 'Mot de passe incorrect';
        if(error.code === 'auth/invalid-credential') message = 'Email ou mot de passe incorrect';
        if(error.code === 'auth/too-many-requests') message = 'Trop de tentatives — ton compte est bloqué quelques minutes par sécurité. Attends un peu ou utilise "Mot de passe oublié ?"';
        if(error.code === 'auth/network-request-failed') message = 'Problème de connexion internet. Réessaie.';
        errorDiv.textContent = message;
        errorDiv.classList.add('show');
    }
});

// REGISTER
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const firstName = document.getElementById('registerFirstName').value.trim();
    const email = document.getElementById('registerEmail').value;
    const password = document.getElementById('registerPassword').value;
    const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
    const errorDiv = document.getElementById('registerError');
    const loadingDiv = document.getElementById('registerLoading');
    
    errorDiv.classList.remove('show');
    loadingDiv.classList.add('show');

    if(!firstName) {
        loadingDiv.classList.remove('show');
        errorDiv.textContent = 'Merci d\'indiquer ton prénom';
        errorDiv.classList.add('show');
        return;
    }
    
    if(password !== passwordConfirm) {
        loadingDiv.classList.remove('show');
        errorDiv.textContent = 'Les mots de passe ne correspondent pas';
        errorDiv.classList.add('show');
        return;
    }
    
    if(password.length < 6) {
        loadingDiv.classList.remove('show');
        errorDiv.textContent = 'Le mot de passe doit avoir au moins 6 caractères';
        errorDiv.classList.add('show');
        return;
    }
    
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        // Enregistrer le prénom dans le profil Firebase + en local
        if(cred && cred.user){
            await cred.user.updateProfile({ displayName: firstName });
        }
        localStorage.setItem('repz_firstName', firstName);
        window.location.href = 'app.html';
    } catch(error) {
        loadingDiv.classList.remove('show');
        let message = 'Erreur : ' + error.code;
        if(error.code === 'auth/email-already-in-use') message = 'Cet email est déjà utilisé';
        if(error.code === 'auth/invalid-email') message = 'Email invalide';
        if(error.code === 'auth/weak-password') message = 'Mot de passe trop faible';
        errorDiv.textContent = message;
        errorDiv.classList.add('show');
    }
});

// RECOVERY
document.getElementById('recoveryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('recoveryEmail').value;
    const errorDiv = document.getElementById('recoveryError');
    const successDiv = document.getElementById('recoverySuccess');
    const loadingDiv = document.getElementById('recoveryLoading');
    
    errorDiv.classList.remove('show');
    successDiv.classList.remove('show');
    loadingDiv.classList.add('show');
    
    try {
        await auth.sendPasswordResetEmail(email);
        loadingDiv.classList.remove('show');
        successDiv.textContent = 'Lien de réinitialisation envoyé à ton email ! Vérifie ta boîte de réception.';
        successDiv.classList.add('show');
        setTimeout(() => toggleForm('login'), 3000);
    } catch(error) {
        loadingDiv.classList.remove('show');
        errorDiv.textContent = 'Email non trouvé ou erreur lors de l\'envoi';
        errorDiv.classList.add('show');
    }
});
</script>

<script>
/* ===== SYNC PREMIUM depuis Firestore (source de vérité = le compte) ===== */
(function(){
  function syncPremium(u){
    if(!u || !window.firebase || !firebase.firestore) return;
    firebase.firestore().collection('users').doc(u.uid).get().then(function(doc){
      var prem = doc.exists && doc.data().premium === true;
      var had = localStorage.getItem('repz_premium') === '1';
      if(prem){ localStorage.setItem('repz_premium','1'); }
      else { localStorage.removeItem('repz_premium'); }
      if(prem !== had && !sessionStorage.getItem('repz_premSynced')){
        sessionStorage.setItem('repz_premSynced','1');
        location.reload();
      }
    }).catch(function(e){ console.warn('premium sync', e); });
  }
  try{
    if(window.firebase && firebase.auth){
      firebase.auth().onAuthStateChanged(function(u){ if(u) syncPremium(u); });
    }
  }catch(e){}
})();
</script>
</body>
</html>
